<!DOCTYPE html>
<html lang="ru">
<head>
    <style>
        /* Добавь это для управления окном в Electron */
        header { -webkit-app-region: drag; } /* Позволяет перетаскивать окно за хедер */
        button { -webkit-app-region: no-drag; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <script>
        // Проверка: запущены мы в браузере или в Electron
        const isElectron = navigator.userAgent.toLowerCase().includes(' electron/');
        let ipcRenderer = null;
        if (isElectron) {
            ipcRenderer = require('electron').ipcRenderer;
        }

        async function askGemini() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim().toLowerCase();
            if (!msg) return;

            appendMessage('YOU', msg);
            input.value = "";

            // 1. ЛОГИКА УПРАВЛЕНИЯ БРАУЗЕРОМ (window.open)
            if (msg.includes("найди") || msg.includes("search")) {
                const query = msg.replace("найди", "").trim();
                appendMessage('ALINA', "Окей, открываю поиск...");
                window.open(`https://google.com/search?q=${encodeURIComponent(query)}`, '_blank');
                return;
            }

            // 2. ЛОГИКА УПРАВЛЕНИЯ ПК (Только для Electron)
            if (isElectron) {
                if (msg.includes("открой блокнот")) {
                    ipcRenderer.send('execute-command', 'notepad.exe');
                    appendMessage('ALINA', "Блокнот на базе, босс.");
                    return;
                }
                if (msg.includes("выключи комп")) {
                    appendMessage('ALINA', "Прощай, кожаный... Выключаюсь.");
                    ipcRenderer.send('execute-command', 'shutdown /s /t 60'); // Выключит через минуту
                    return;
                }
            }

            // 3. ОБЫЧНЫЙ ОТВЕТ ОТ GEMINI (Твой старый fetch)
            fetchGemini(msg);
        }

        async function fetchGemini(msg) {
            document.getElementById('main-ui').classList.add('thinking');
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Ты Алина, управляешь этим ПК. Ответь дерзко: ${msg}` }] }] })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                appendMessage('ALINA', aiText);
                speak(aiText);
            } catch (e) {
                appendMessage('SYSTEM', 'Ошибка линка. Проверь VPN.');
            }
            document.getElementById('main-ui').classList.remove('thinking');
        }

        // [Остальные функции: appendMessage, speak, toggleMenu и т.д.]
    </script>
</body>
</html>
