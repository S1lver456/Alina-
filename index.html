<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALINA OS | Red Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #050000; color: #ff4d4d; font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }
        .neon-red { color: #ff4d4d; text-shadow: 0 0 10px #ff0000; }
        .glass { background: rgba(20, 0, 0, 0.9); backdrop-filter: blur(10px); border: 1px solid #600; }
        
        /* Новое лицо - Техно-глаз Алины */
        .alina-core {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 2px solid #ff0000;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px #800;
            position: relative;
        }
        .core-inner {
            width: 60px; height: 60px;
            background: radial-gradient(circle, #ff0000 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }
        
        .thinking .alina-core { border-color: #fff; box-shadow: 0 0 30px #ff4d4d; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-4 border-b border-red-900 flex justify-between items-center glass">
        <div class="neon-red font-bold tracking-widest text-lg">ALINA_v1.0</div>
        <div id="status" class="text-[10px] text-red-500 font-bold uppercase">System Link</div>
    </header>

    <main id="main-ui" class="flex-1 overflow-hidden flex flex-col items-center justify-start pt-12 p-4">
        <div class="flex flex-col items-center mb-10">
            <div class="alina-core">
                <div class="core-inner"></div>
            </div>
            <p class="text-[10px] mt-4 tracking-[0.4em] opacity-60 neon-red">Neural Interface</p>
        </div>

        <div id="chat-box" class="w-full max-w-md flex-1 overflow-y-auto space-y-4 p-2 text-sm border-t border-red-900/20 pt-4">
            <div class="text-center text-red-900 text-[10px]">Алина в сети. Жду приказа.</div>
        </div>
    </main>

    <footer class="p-4 glass border-t border-red-900">
        <div class="flex gap-2 items-center max-w-md mx-auto">
            <button onclick="startVoiceInput()" id="mic-btn" class="p-3 border border-red-900 rounded-full text-red-500 hover:bg-red-950">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" /></svg>
            </button>
            <input type="text" id="user-input" placeholder="Команда..." 
                   class="flex-1 bg-black border border-red-900 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-red-500 text-red-100">
            <button onclick="askGemini()" class="bg-red-800 text-white px-6 py-3 rounded-lg font-bold text-xs hover:bg-red-600">ASK</button>
        </div>
    </footer>

    <script>
        const API_KEY = "AIzaSyDE9xVebhRfr9sIUYKOpVrn0jg1JyOqnhk"; 
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;

        const chatBox = document.getElementById('chat-box');
        const inputField = document.getElementById('user-input');
        const mainUI = document.getElementById('main-ui');

        inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") askGemini(); });

        async function askGemini() {
            const msg = inputField.value.trim();
            if (!msg) return;

            appendMessage('YOU', msg);
            inputField.value = "";
            mainUI.classList.add('thinking');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Будь дерзкой Алиной, экспертом 3D. Ответь кратко: " + msg }] }] })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                appendMessage('ALINA', aiText);
                speak(aiText);
            } catch (error) {
                appendMessage('SYSTEM', 'Связь прервана. Проверь VPN/Сеть.');
            }
            mainUI.classList.remove('thinking');
        }

        function startVoiceInput() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            const rec = new SpeechRecognition();
            rec.lang = 'ru-RU';
            rec.onresult = (e) => { inputField.value = e.results[0][0].transcript; askGemini(); };
            rec.start();
        }

        function speak(text) {
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'ru-RU'; s.pitch = 1.2;
            window.speechSynthesis.speak(s);
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = sender === 'YOU' ? 'text-right' : 'text-left';
            div.innerHTML = `<span class="text-[9px] font-bold opacity-40">${sender}</span><br><span class="${sender === 'YOU' ? 'text-white' : 'text-red-500'}">${text}</span>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
