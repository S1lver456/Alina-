<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALINA AI | 3D & Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #e11d48; font-family: 'JetBrains Mono', monospace; }
        .neon-text { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px #e11d48; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid #4c0519; }
        .orb {
            width: 80px; height: 80px;
            background: radial-gradient(circle, #fb7185 0%, transparent 70%);
            border-radius: 50%;
            box-shadow: 0 0 20px #e11d48;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #4c0519; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen max-h-screen">

    <header class="p-4 border-b border-rose-900 flex justify-between items-center glass">
        <div class="neon-text font-bold tracking-tighter text-lg text-rose-500">ALINA_v1.0</div>
        <div id="connection-status" class="text-[10px] text-rose-400 font-bold">● NEURAL_LINK_ACTIVE</div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="flex flex-col items-center my-10 text-center">
            <div class="orb mb-4"></div>
            <p class="text-[10px] text-rose-600 uppercase tracking-widest">Alina is ready for action...</p>
        </div>
    </main>

    <div id="net-panel" class="hidden p-3 mx-4 rounded-lg glass border-rose-500/30 text-[10px] mb-2">
        <div class="text-rose-300">IP_ADDR: <span id="pub-ip" class="text-white">SCANNING...</span></div>
        <div class="text-rose-300">LOCATION: <span id="region" class="text-white">...</span></div>
    </div>

    <footer class="p-4 glass border-t border-rose-900">
        <div class="flex gap-2">
            <button onclick="toggleNetPanel()" class="p-2 border border-rose-800 rounded-lg text-[10px] hover:bg-rose-950 text-rose-400">NET</button>
            <input type="text" id="user-input" placeholder="Спроси Алину..." 
                   class="flex-1 bg-black border border-rose-900 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-rose-400 text-rose-100">
            <button onclick="askGemini()" class="bg-rose-600 text-white px-4 py-2 rounded-lg font-bold text-xs hover:bg-rose-500">ASK</button>
        </div>
    </footer>

    <script>
        const API_KEY = "AIzaSyAPy8vfTVpLVnfBsgFA-m-baKzv5wn7TsQ"; 
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;

        const chatBox = document.getElementById('chat-box');
        const inputField = document.getElementById('user-input');

        inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") askGemini(); });

        async function askGemini() {
            const msg = inputField.value.trim();
            if (!msg) return;

            appendMessage('YOU', msg);
            inputField.value = "";
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ 
                            parts: [{ 
                                text: "Твое имя Алина. Ты — дерзкая, умная девушка, эксперт в 3D (Blender, UE5) и хакинге. Общайся на 'ты', будь краткой, саркастичной, но помогай по делу. Ответь на это: " + msg 
                            }] 
                        }] 
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                appendMessage('ALINA', aiText);
                
                const speech = new SpeechSynthesisUtterance(aiText);
                speech.lang = 'ru-RU';
                speech.pitch = 1.2; // Чуть повыше голос
                window.speechSynthesis.speak(speech);

            } catch (error) {
                appendMessage('SYSTEM', 'Ошибка доступа. Проверь API-ключ или сеть.');
            }
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = sender === 'YOU' ? 'text-right' : 'text-left';
            const color = sender === 'YOU' ? 'text-white' : 'text-rose-400';
            div.innerHTML = `<span class="text-[10px] opacity-50 font-bold">${sender}</span><br><span class="${color}">${text}</span>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function toggleNetPanel() {
            const panel = document.getElementById('net-panel');
            panel.classList.toggle('hidden');
            if(!panel.classList.contains('hidden')) fetchNetInfo();
        }

        async function fetchNetInfo() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                document.getElementById('pub-ip').innerText = data.ip;
                document.getElementById('region').innerText = data.country_name;
            } catch (e) {
                document.getElementById('pub-ip').innerText = "ERROR";
            }
        }
    </script>
</body>
</html>
