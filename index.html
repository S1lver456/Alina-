<!DOCTYPE html>

    <style>
        body { background: #020617; color: #fb7185; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .neon-text { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 15px #e11d48; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid #881337; }
        
        /* Анимированный Аватар Алины */
        .alina-avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, #fb7185 0%, transparent 70%);
            box-shadow: 0 0 30px #e11d48;
            position: relative;
            transition: all 0.3s ease;
        }
        .alina-avatar::after {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%; border: 2px solid #e11d48; opacity: 0.5;
            animation: orb-pulse 2s infinite ease-in-out;
        }
        @keyframes orb-pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.6; } }
        
        /* Состояние "Алина думает" */
        .alina-avatar.thinking { animation: thinking-glow 1s infinite alternate; }
        @keyframes thinking-glow { 0% { box-shadow: 0 0 20px #e11d48; } 100% { box-shadow: 0 0 50px #fb7185, 0 0 70px #e11d48; } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #881337; border-radius: 10px; }
    </style>
</head>
