<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALINA OS | Ultimate Hybrid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style id="dynamic-style">
        :root { --bg: #050000; --text: #ff4d4d; --accent: #ff0000; --glass: rgba(20, 0, 0, 0.95); --border: #600; }
        body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; transition: 0.3s; }
        header { -webkit-app-region: drag; } /* Для Electron */
        button, input { -webkit-app-region: no-drag; }
        .neon { color: var(--text); text-shadow: 0 0 10px var(--accent); }
        .glass { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); }
        .alina-core { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--accent); display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px var(--border); position: relative; overflow: hidden; }
        .core-inner { width: 60px; height: 60px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); border-radius: 50%; animation: pulse 1.5s infinite ease-in-out; }
        .alina-gif { width: 100%; height: 100%; object-fit: cover; display: none; }
        @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }
        #sidebar { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; }
        .panel { display: none; }
        .panel-active { display: block; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .menu-btn { width: 100%; padding: 18px; text-align: left; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: bold; letter-spacing: 1px; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        #chat-box::-webkit-scrollbar { width: 3px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="sidebar" class="fixed top-0 right-0 w-80 h-full glass translate-x-full flex flex-col shadow-2xl">
        <div class="p-5 border-b border-red-900 flex justify-between items-center">
            <span id="menu-title" class="neon font-bold tracking-widest text-sm">SYSTEM MENU</span>
            <button onclick="toggleMenu()" class="text-3xl text-red-500">&times;</button>
        </div>

        <div id="main-menu" class="panel panel-active">
            <button onclick="switchPanel('params')" class="menu-btn uppercase">⚙️ <span id="btn-params">Параметры</span> <span>&rsaquo;</span></button>
            <button onclick="switchPanel('vpn')" class="menu-btn uppercase">🛡 <span id="btn-vpn">VPN Центр</span> <span>&rsaquo;</span></button>
            <button onclick="if(isElectron) window.close();" class="menu-btn text-red-600 uppercase">✕ <span id="btn-exit">Выход</span></button>
        </div>

        <div id="params-menu" class="panel">
            <button onclick="switchPanel('main')" class="menu-btn text-red-400">← BACK</button>
            <div class="p-5 border-b border-red-900">
                <p class="text-[9px] opacity-50 mb-4 uppercase tracking-tighter">OS Theme</p>
                <button onclick="setTheme('red')" class="w-full py-3 mb-2 bg-red-950 border border-red-500 text-[10px] font-bold">OS RED (CORE)</button>
                <button onclick="setTheme('cyber')" class="w-full py-3 bg-slate-950 border border-rose-600 text-[10px] text-rose-500 font-bold">CYBER ROSE (GIF)</button>
            </div>
            <div class="p-5 border-b border-red-900">
                <p class="text-[9px] opacity-50 mb-4 uppercase tracking-tighter">Language</p>
                <div class="flex gap-2">
                    <button onclick="setLang('ru')" class="flex-1 py-2 border border-red-900 text-[10px] hover:bg-red-900">RU</button>
                    <button onclick="setLang('uk')" class="flex-1 py-2 border border-red-900 text-[10px] hover:bg-red-900">UA</button>
                    <button onclick="setLang('en')" class="flex-1 py-2 border border-red-900 text-[10px] hover:bg-red-900">EN</button>
                </div>
            </div>
            <button onclick="clearHistory()" class="menu-btn text-red-600">🗑 CLEAR MEMORY</button>
        </div>

        <div id="vpn-menu" class="panel">
            <button onclick="switchPanel('main')" class="menu-btn text-red-400">← BACK</button>
            <div class="p-8 flex flex-col items-center text-center">
                <div id="vpn-circle" class="w-20 h-20 border-4 border-red-900 rounded-full flex items-center justify-center mb-4 transition-all">🛡</div>
                <div id="vpn-ip-detail" class="text-xs font-bold mb-1 tracking-widest">DETECTING...</div>
                <button onclick="toggleVPN()" id="vpn-toggle-btn" class="w-full py-4 bg-red-900/20 border-2 border-red-600 text-red-500 font-black text-xs tracking-widest rounded-xl mt-4">ACTIVATE</button>
            </div>
        </div>
    </div>

    <header class="p-4 border-b border-red-900 flex justify-between items-center glass">
        <div class="neon font-bold tracking-widest text-lg" id="os-title">ALINA_v5.0</div>
        <button onclick="toggleMenu()" class="p-2 bg-red-950/30 rounded-lg">☰</button>
    </header>

    <main id="main-ui" class="flex-1 overflow-hidden flex flex-col items-center justify-start pt-10 p-4">
        <div class="alina-core" id="alina-face">
            <div class="core-inner" id="core-anim"></div>
            <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3A0dzA1Z3BteWx4bnlhbnA1NmtyYzRyamt1ZXQzZzNxdWljY2pyMiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3oKIPnAiaMCws8nOKY/giphy.gif" class="alina-gif" id="core-gif">
        </div>
        <p id="sub-text" class="text-[10px] mt-4 tracking-[0.4em] opacity-60 neon uppercase">System Online</p>
        <div id="chat-box" class="w-full max-w-md flex-1 overflow-y-auto space-y-4 p-2 text-sm mt-4"></div>
    </main>

    <footer class="p-4 glass border-t border-red-900">
        <div class="flex gap-2 items-center max-w-md mx-auto">
            <button onclick="startVoiceInput()" class="p-3 border border-red-900 rounded-full text-red-500">🎤</button>
            <input type="text" id="user-input" placeholder="..." class="flex-1 bg-black border border-red-900 rounded-lg px-4 py-3 text-sm focus:outline-none text-red-100">
            <button onclick="askGemini()" class="bg-red-800 text-white px-6 py-3 rounded-lg font-bold text-xs">ASK</button>
        </div>
    </footer>

    <script>
        const API_KEY = "AIzaSyCMkW5VtqAKAXupmaBrX27dmMiXkyPPapM"; 
        const API_URL = "curl "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent" \
  -H 'Content-Type: application/json' \
  -H 'X-goog-api-key: AIzaSyCMkW5VtqAKAXupmaBrX27dmMiXkyPPapM' \
  -X POST \
  -d '{
    "contents": [
      {
        "parts": [
          {
            "text": "Explain how AI works in a few words"
          }
        ]
      }
    ]
  }'" + API_KEY;
        
        const isElectron = navigator.userAgent.toLowerCase().includes(' electron/');
        let ipcRenderer = isElectron ? require('electron').ipcRenderer : null;
        let currentLang = 'ru';

        // Логика переключения языков
        function setLang(l) {
            currentLang = l;
            const ui = {
                ru: { p: 'Параметры', v: 'VPN Центр', e: 'Выход', sub: 'Интерфейс Активен' },
                uk: { p: 'Параметри', v: 'VPN Центр', e: 'Вихід', sub: 'Інтерфейс Активний' },
                en: { p: 'Parameters', v: 'VPN Center', e: 'Exit', sub: 'Neural Interface Active' }
            };
            document.getElementById('btn-params').innerText = ui[l].p;
            document.getElementById('btn-vpn').innerText = ui[l].v;
            document.getElementById('btn-exit').innerText = ui[l].e;
            document.getElementById('sub-text').innerText = ui[l].sub;
            appendMessage('SYSTEM', l === 'en' ? 'Language: EN' : (l === 'uk' ? 'Мова: УКР' : 'Язык: РУС'));
            toggleMenu();
        }

        async function askGemini() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim().toLowerCase();
            if (!msg) return;

            appendMessage('YOU', msg);
            input.value = "";

            // --- ГИБРИДНЫЕ КОМАНДЫ ---
            
            // 1. Поиск (Вкладки или Системный браузер)
            if (msg.includes("найди") || msg.includes("search") || msg.includes("знайди")) {
                const query = msg.replace(/найди|search|знайди/g, "").trim();
                const url = `https://google.com/search?q=${encodeURIComponent(query)}`;
                appendMessage('ALINA', currentLang === 'en' ? "Searching..." : "Ищу...");
                if(isElectron) ipcRenderer.send('execute-command', url);
                else window.open(url, '_blank');
                return;
            }

            // 2. Управление ПК (Только Electron)
            if (isElectron) {
                if (msg.includes("блокнот") || msg.includes("notepad")) {
                    ipcRenderer.send('execute-command', 'notepad.exe');
                    appendMessage('ALINA', "Notepad launched."); return;
                }
                if (msg.includes("выключи") || msg.includes("shutdown") || msg.includes("вимкни")) {
                    ipcRenderer.send('execute-command', 'shutdown /s /t 60');
                    appendMessage('ALINA', "Shutdown sequence initiated."); return;
                }
            }

            // 3. Обычный чат
            document.getElementById('main-ui').classList.add('thinking');
            try {
                const prompt = `You are Alina, a sassy, sarcastic IT expert AI. Current language: ${currentLang}. Short answers only. Query: ${msg}`;
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                appendMessage('ALINA', aiText);
                speak(aiText);
            } catch (e) { appendMessage('SYSTEM', 'Link Error.'); }
            document.getElementById('main-ui').classList.remove('thinking');
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = sender === 'YOU' ? 'text-right' : 'text-left';
            const color = sender === 'ALINA' ? 'text-red-500' : (sender === 'SYSTEM' ? 'text-yellow-500' : 'text-white');
            div.innerHTML = `<span class="text-[9px] font-bold opacity-30 uppercase">${sender}</span><br><span class="${color}">${text}</span>`;
            const box = document.getElementById('chat-box');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function toggleMenu() {
            const side = document.getElementById('sidebar');
            const isOpen = side.style.transform === 'translateX(0px)';
            side.style.transform = isOpen ? 'translateX(100%)' : 'translateX(0px)';
        }

        function switchPanel(panel) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('panel-active'));
            document.getElementById(panel + '-menu').classList.add('panel-active');
        }

        function setTheme(type) {
            const gif = document.getElementById('core-gif');
            const anim = document.getElementById('core-anim');
            if(type === 'red') { gif.style.display = 'none'; anim.style.display = 'block'; }
            else { gif.style.display = 'block'; anim.style.display = 'none'; }
            toggleMenu();
        }

        function speak(t) {
            const s = new SpeechSynthesisUtterance(t);
            s.lang = currentLang === 'uk' ? 'uk-UA' : (currentLang === 'en' ? 'en-US' : 'ru-RU');
            window.speechSynthesis.speak(s);
        }

        function toggleVPN() {
            vpnActive = !vpnActive;
            const btn = document.getElementById('vpn-toggle-btn');
            btn.innerText = vpnActive ? "DEACTIVATE" : "ACTIVATE";
            btn.style.borderColor = vpnActive ? "#22c55e" : "#e11d48";
            document.getElementById('vpn-status-text').innerText = vpnActive ? "Status: Secure" : "Status: Unprotected";
        }

        function clearHistory() { document.getElementById('chat-box').innerHTML = ""; toggleMenu(); }

        window.onload = () => { appendMessage('SYSTEM', 'Kernel v5.0 Loaded'); };
    </script>
</body>
</html>
