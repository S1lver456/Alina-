<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALINA AI | Cyber-Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #010409; color: #fb7185; font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }
        .neon-text { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 15px #e11d48; }
        .glass { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(10px); border: 1px solid #881337; }
        
        /* Аватар Алины (GIF) */
        .alina-avatar {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 2px solid #e11d48;
            box-shadow: 0 0 25px #e11d48;
            background-color: #000;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .alina-avatar img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        
        /* Эффект пульсации при наведении (чисто для визуала) */
        .alina-avatar:hover { box-shadow: 0 0 40px #fb7185; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #881337; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen max-h-screen">

    <header class="p-4 border-b border-rose-950 flex justify-between items-center glass z-10">
        <div class="neon-text font-bold tracking-tighter text-xl text-rose-500">ALINA_OS</div>
        <div id="status" class="text-[10px] text-rose-400 font-bold tracking-widest">SYSTEM ONLINE</div>
    </header>

    <main class="flex-1 overflow-hidden flex flex-col items-center justify-start pt-8 p-4 relative">
        
        <div class="flex flex-col items-center my-6 z-10 text-center">
            <div id="alina-face" class="alina-avatar mb-4">
                <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3A0dzA1Z3BteWx4bnlhbnA1NmtyYzRyamt1ZXQzZzNxdWljY2pyMiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3oKIPnAiaMCws8nOKY/giphy.gif" alt="Alina Face">
            </div>
            <p class="text-[11px] text-rose-600 uppercase tracking-widest neon-text">Neural Interface</p>
        </div>

        <div id="chat-box" class="w-full max-w-md flex-1 overflow-y-auto space-y-4 p-2 text-sm">
            <div class="text-center text-rose-300 opacity-60 text-xs">Нажми микрофон и скажи: "Привет, Алина" или напечатай запрос.</div>
        </div>
    </main>

    <footer class="p-4 glass border-t border-rose-950 z-10">
        <div class="flex gap-2 items-center">
            <button onclick="startVoiceInput()" id="mic-btn" class="p-3 border border-rose-800 rounded-full text-rose-400 hover:bg-rose-950 hover:border-rose-500 transition-all active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
                </svg>
            </button>

            <input type="text" id="user-input" placeholder="Команда для Алины..." 
                   class="flex-1 bg-black border border-rose-900 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-rose-400 text-rose-100 placeholder:text-rose-950">
            
            <button onclick="askGemini()" class="bg-rose-600 text-white px-5 py-3 rounded-lg font-bold text-xs hover:bg-rose-500 transition-all active:scale-95">ASK</button>
        </div>
    </footer>

    <script>
        const API_KEY = "AIzaSyAPy8vfTVpLVnfBsgFA-m-baKzv5wn7TsQ"; 
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;

        const chatBox = document.getElementById('chat-box');
        const inputField = document.getElementById('user-input');
        const statusText = document.getElementById('status');
        const micBtn = document.getElementById('mic-btn');

        inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") askGemini(); });

        async function askGemini() {
            const msg = inputField.value.trim();
            if (!msg) return;

            appendMessage('YOU', msg);
            inputField.value = "";
            setAlinaStatus('THINKING...', true);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: "Твое имя Алина. Ты — дерзкая, умная девушка-эксперт в 3D (Blender, UE5) и IT. Общайся на 'ты', будь краткой, саркастичной. Ответь на это: " + msg }] }] 
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error ? errorData.error.message : 'API Error');
                }

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                appendMessage('ALINA', aiText);
                speak(aiText);
                setAlinaStatus('ONLINE', false);

            } catch (error) {
                console.error('Alina Error:', error);
                appendMessage('SYSTEM', 'Критическая ошибка нейросети. Алина недоступна.');
                setAlinaStatus('ERROR', false);
            }
        }

        // Голосовой ввод (Распознавание речи)
        function startVoiceInput() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { appendMessage('SYSTEM', 'Браузер не поддерживает голос.'); return; }

            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.start();

            setAlinaStatus('LISTENING...', true);
            micBtn.classList.add('bg-rose-950', 'border-rose-400');

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                inputField.value = transcript;
                askGemini(); // Автоотправка
            };

            recognition.onspeechend = () => { recognition.stop(); finishListening(); };
            recognition.onerror = () => { finishListening(); setAlinaStatus('ERROR', false); };
        }

        function finishListening() {
             micBtn.classList.remove('bg-rose-950', 'border-rose-400');
             setAlinaStatus('ONLINE', false);
        }

        // Озвучка (Женский голос)
        function speak(text) {
            window.speechSynthesis.cancel(); 
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'ru-RU';
            speech.pitch = 1.1; 
            window.speechSynthesis.speak(speech);
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = sender === 'YOU' ? 'text-right' : 'text-left';
            const color = sender === 'YOU' ? 'text-white' : 'text-rose-400';
            div.innerHTML = `<span class="text-[10px] opacity-50 font-bold tracking-widest">${sender}</span><br><span class="${color}">${text}</span>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setAlinaStatus(text, thinking) {
            statusText.innerText = text;
            if(thinking) statusText.classList.add('animate-pulse', 'text-rose-300');
            else statusText.classList.remove('animate-pulse', 'text-rose-300');
        }
    </script>
</body>
</html>
