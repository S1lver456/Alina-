<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALINA MULTI-OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style id="theme-style">
        /* По умолчанию Красная тема */
        :root { --bg: #050000; --text: #ff4d4d; --accent: #ff0000; --glass: rgba(20, 0, 0, 0.9); --border: #600; --font: 'JetBrains Mono'; }
        
        body { background: var(--bg); color: var(--text); font-family: var(--font), monospace; overflow: hidden; height: 100vh; transition: 0.3s; }
        .neon { text-shadow: 0 0 10px var(--accent); }
        .glass { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); }
        
        /* Лицо Алины */
        .alina-core { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--accent); display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(255,0,0,0.3); position: relative; overflow: hidden; }
        .core-inner { width: 60px; height: 60px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); border-radius: 50%; animation: pulse 1.5s infinite ease-in-out; }
        .alina-avatar-img { width: 100%; height: 100%; object-fit: cover; display: none; } /* Скрыто в красной теме */

        @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }
        .thinking .alina-core { border-color: #fff; box-shadow: 0 0 30px var(--text); }

        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; }
        .sub-panel { display: none; }
        .active-panel { display: block; }
        
        .menu-btn { width: 100%; padding: 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; transition: 0.2s; }
        .menu-btn:active { background: var(--border); }
    </style>
</head>
<body class="flex flex-col h-screen relative">

    <div id="sidebar" class="fixed top-0 right-0 w-72 h-full glass translate-x-full flex flex-col shadow-2xl">
        <div class="p-4 border-b border-red-900 flex justify-between items-center">
            <span id="menu-title" class="neon font-bold">MAIN MENU</span>
            <button onclick="toggleMenu()" class="text-2xl">&times;</button>
        </div>

        <div id="main-panel" class="sub-panel active-panel">
            <button onclick="openPanel('params')" class="menu-btn">⚙️ ПАРАМЕТРЫ</button>
            <div class="p-4 border-b border-red-900">
                <p class="text-[10px] opacity-50 mb-2">SECURITY STATUS</p>
                <div id="vpn-stat" class="text-xs mb-3">IP: Detecting...</div>
                <button onclick="toggleVPN()" id="vpn-trigger" class="w-full py-3 border border-red-900 rounded font-bold text-[10px]">ВКЛЮЧИТЬ VPN</button>
            </div>
        </div>

        <div id="params-panel" class="sub-panel">
            <button onclick="openPanel('main')" class="menu-btn text-xs">← НАЗАД</button>
            
            <div class="p-4 border-b border-red-900">
                <p class="text-[10px] opacity-50 mb-2">INTERFACE LANGUAGE</p>
                <div class="flex gap-1">
                    <button onclick="setLang('ru')" class="flex-1 py-1 border border-red-900 text-[9px]">RU</button>
                    <button onclick="setLang('uk')" class="flex-1 py-1 border border-red-900 text-[9px]">UK</button>
                    <button onclick="setLang('en')" class="flex-1 py-1 border border-red-900 text-[9px]">EN</button>
                </div>
            </div>

            <div class="p-4 border-b border-red-900">
                <p class="text-[10px] opacity-50 mb-2">SYSTEM THEME</p>
                <button onclick="setTheme('red')" class="w-full py-2 mb-2 bg-red-950 text-[10px] border border-red-500">RED NEON (OS v1)</button>
                <button onclick="setTheme('light')" class="w-full py-2 bg-white text-black text-[10px]">LIGHT MINIMAL (v2)</button>
            </div>

            <button onclick="clearHistory()" class="menu-btn text-red-500">🗑 ОЧИСТИТЬ ИСТОРИЮ</button>
        </div>
    </div>

    <header class="p-4 border-b border-red-900 flex justify-between items-center glass z-10">
        <div id="header-logo" class="neon font-bold tracking-widest text-lg">ALINA_SYSTEM</div>
        <button onclick="toggleMenu()" class="p-1">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
    </header>

    <main id="main-ui" class="flex-1 overflow-hidden flex flex-col items-center justify-start pt-10 p-4">
        <div class="flex flex-col items-center mb-8">
            <div class="alina-core" id="alina-face">
                <div class="core-inner" id="core-eye"></div>
                <img src="https://i.ibb.co/F6P9M6R/alina-face-real.png" class="alina-avatar-img" id="face-img">
            </div>
            <p id="loc-tag" class="text-[9px] mt-4 tracking-[0.4em] opacity-60 neon">Neural Interface Active</p>
        </div>

        <div id="chat-box" class="w-full max-w-md flex-1 overflow-y-auto space-y-4 p-2 text-sm border-t border-red-900/20 pt-4"></div>
    </main>

    <footer class="p-4 glass border-t border-red-900">
        <div class="flex gap-2 items-center max-w-md mx-auto">
            <button onclick="startVoiceInput()" class="p-3 border border-red-900 rounded-full text-red-500"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg></button>
            <input type="text" id="user-input" placeholder="Введите команду..." class="flex-1 bg-black/20 border border-red-900 rounded-lg px-4 py-3 text-sm outline-none focus:border-red-500">
            <button onclick="askGemini()" class="bg-red-800 text-white px-6 py-3 rounded-lg font-bold text-xs active:scale-95">ASK</button>
        </div>
    </footer>

    <script>
        const API_KEY = "AIzaSyDE9xVebhRfr9sIUYKOpVrn0jg1JyOqnhk";
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;
        
        let vpnActive = false;
        let currentLang = 'ru';
        let currentTheme = 'red';

        // Инициализация
        window.onload = () => { fetchIP(); renderHistory(); };

        function toggleMenu() {
            const s = document.getElementById('sidebar');
            s.style.transform = s.style.transform === 'translateX(0px)' ? 'translateX(100%)' : 'translateX(0px)';
            openPanel('main');
        }

        function openPanel(panelId) {
            document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active-panel'));
            document.getElementById(panelId + '-panel').classList.add('active-panel');
            document.getElementById('menu-title').innerText = panelId === 'main' ? 'MAIN MENU' : 'PARAMETERS';
        }

        function setTheme(theme) {
            currentTheme = theme;
            const style = document.getElementById('theme-style');
            const eye = document.getElementById('core-eye');
            const img = document.getElementById('face-img');
            const input = document.getElementById('user-input');

            if(theme === 'red') {
                style.innerHTML = `:root { --bg: #050000; --text: #ff4d4d; --accent: #ff0000; --glass: rgba(20, 0, 0, 0.9); --border: #600; --font: 'JetBrains Mono'; } body { background: var(--bg); color: var(--text); font-family: var(--font); } .neon { text-shadow: 0 0 10px var(--accent); } .glass { background: var(--glass); border: 1px solid var(--border); }`;
                eye.style.display = 'block'; img.style.display = 'none';
                input.classList.add('bg-black/20'); input.classList.remove('bg-white');
            } else {
                style.innerHTML = `:root { --bg: #fafafa; --text: #1f2937; --accent: #f43f5e; --glass: rgba(255, 255, 255, 0.9); --border: #e5e7eb; --font: 'Montserrat'; } body { background: var(--bg); color: var(--text); font-family: var(--font); } .neon { text-shadow: none; font-weight: 600; } .glass { background: var(--glass); border: 1px solid var(--border); }`;
                eye.style.display = 'none'; img.style.display = 'block';
                input.classList.remove('bg-black/20'); input.classList.add('bg-white');
            }
            toggleMenu();
        }

        async function fetchIP() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                document.getElementById('vpn-stat').innerHTML = `IP: ${data.ip} | ${data.country_code}`;
            } catch(e) { document.getElementById('vpn-stat').innerText = "IP: Protected/Hidden"; }
        }

        function toggleVPN() {
            vpnActive = !vpnActive;
            const btn = document.getElementById('vpn-trigger');
            const tag = document.getElementById('loc-tag');
            if(vpnActive) {
                btn.innerText = "VPN: PROTECTED"; btn.style.color = "#4ade80";
                tag.innerText = "LOC: FRANKFURT / GERMANY (ENCRYPTED)";
                appendMessage('SYSTEM', 'VPN tunnel created.');
            } else {
                btn.innerText = "ВКЛЮЧИТЬ VPN"; btn.style.color = "";
                fetchIP();
                tag.innerText = "Neural Interface Active";
            }
            toggleMenu();
        }

        function clearHistory() {
            localStorage.removeItem('alina_history');
            document.getElementById('chat-box').innerHTML = '';
            appendMessage('SYSTEM', 'Memory wiped.');
            toggleMenu();
        }

        function setLang(l) { currentLang = l; appendMessage('SYSTEM', 'Language: ' + l.toUpperCase()); toggleMenu(); }

        async function askGemini() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if(!msg) return;

            appendMessage('YOU', msg);
            input.value = "";
            document.getElementById('main-ui').classList.add('thinking');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Ты Алина, дерзкая. Язык: ${currentLang}. Ответь кратко: ${msg}` }] }] })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                appendMessage('ALINA', aiText);
                speak(aiText);
            } catch(e) { appendMessage('SYSTEM', 'Link failed.'); }
            document.getElementById('main-ui').classList.remove('thinking');
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = sender === 'YOU' ? 'text-right' : 'text-left';
            const color = sender === 'ALINA' ? 'text-rose-500' : (sender === 'SYSTEM' ? 'text-yellow-500' : 'text-gray-400');
            div.innerHTML = `<span class="text-[8px] font-bold opacity-40 uppercase">${sender}</span><br><span class="${sender==='YOU'?'text-white':color}">${text}</span>`;
            const box = document.getElementById('chat-box');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function speak(t) {
            const s = new SpeechSynthesisUtterance(t);
            s.lang = currentLang === 'uk' ? 'uk-UA' : (currentLang === 'en' ? 'en-US' : 'ru-RU');
            window.speechSynthesis.speak(s);
        }

        function startVoiceInput() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRecognition();
            rec.lang = currentLang === 'uk' ? 'uk-UA' : 'ru-RU';
            rec.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; askGemini(); };
            rec.start();
        }

        function renderHistory() { /* История загружается тут при необходимости */ }
    </script>
</body>
</html>
